name: Graphify - Regenerar Grafo de Conhecimento

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'graphify-out/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  graphify:
    name: Build knowledge graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-graphifyy

      - name: Instalar Graphify
        run: |
          python -m pip install --upgrade pip
          pip install graphifyy

      - name: Atualizar grafo (graphify update)
        run: |
          graphify update .
        continue-on-error: true

      - name: Gerar arvore visual (graphify tree)
        run: |
          graphify tree --label "${{ github.repository }}"
        continue-on-error: true

      - name: Listar arquivos gerados
        run: |
          ls -la graphify-out/ 2>/dev/null || echo "graphify-out/ nao existe"

      - name: Commitar e pushar mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f graphify-out/.graphify_root ]; then rm -f graphify-out/.graphify_root; fi
          git add graphify-out/graph.json graphify-out/graph.html graphify-out/GRAPH_REPORT.md graphify-out/manifest.json graphify-out/GRAPH_TREE.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhuma mudanca no grafo - nada a commitar."
          else
            git commit -m "chore(graphify): regenera grafo automaticamente [skip ci]"
            git push
          fi
