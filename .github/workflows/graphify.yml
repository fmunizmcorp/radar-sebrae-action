name: Graphify - Regenerar Grafo de Conhecimento

# Roda automaticamente em pushes para a branch principal e tambem manualmente.
# Resultado: docs/graphify/* atualizado a cada commit.

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/graphify/**'
      - '.graphify/**'
  workflow_dispatch:
  schedule:
    # Toda madrugada (3h Brasil = 6h UTC)
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  graphify:
    name: Build knowledge graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-graphifyy

      - name: Instalar Graphify
        run: |
          python -m pip install --upgrade pip
          pip install graphifyy

      - name: Executar graphify build
        run: |
          mkdir -p docs/graphify .graphify
          graphify build . || graphify .
        continue-on-error: true

      - name: Listar arquivos gerados
        run: |
          ls -la docs/graphify/ 2>/dev/null || echo "docs/graphify/ vazio"
          ls -la .graphify/ 2>/dev/null || echo ".graphify/ vazio"

      - name: Commitar e pushar mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graphify .graphify CLAUDE.md .claude 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhuma mudanca no grafo - nada a commitar."
          else
            git commit -m "chore(graphify): regenera grafo automaticamente

[skip ci]"
            git push
          fi
